  /stream:
    get:
      summary: Real-time notifications stream
      description: |
        Connect to real-time notification stream via Server-Sent Events (SSE).
        
        Events emitted:
        - `notification` - In-app notification received
        - `heartbeat` - Keep-alive signal (every 30 seconds)
        - `error` - Error event
        
        Browser example:
        ```javascript
        const eventSource = new EventSource('/api/v1/stream');
        eventSource.addEventListener('notification', (event) => {
          const notification = JSON.parse(event.data);
          console.log('Notification:', notification);
        });
        ```
      operationId: streamNotifications
      tags: [Inbox]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: object
                properties:
                  event:
                    type: string
                    enum: [notification, heartbeat, error]
                  data:
                    type: string
                    description: JSON-encoded event data
                  id:
                    type: string
                    description: Event ID for reconnection
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalServerError'

