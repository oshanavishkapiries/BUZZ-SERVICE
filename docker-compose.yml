version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buzz-postgres
    environment:
      POSTGRES_DB: buzz_service
      POSTGRES_USER: buzz_user
      POSTGRES_PASSWORD: secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buzz_user -d buzz_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buzz-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  buzz-service:
    build: .
    container_name: buzz-service
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
